<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Fotogram</title>
    <script src="script.js"></script>
    <link rel="stylesheet" href="style.css" />
    <link rel="stylesheet" href="style-responsive/tablet-view.css" />
  </head>
  <body onload="init()" class="display-flex flex-column">
    <header id="main-header-on-page" class="display-flex">
      <figure class="display-flex logo">
        <img src="img/logo/logo.svg" alt="Logo Fotogram" />
      </figure>
    </header>
    <main class="display-flex">
      <section
        class="content display-flex flex-column flex-center-x flex-center-y"
      >
        <h1>Your personal photo album</h1>
        <div
          id="fotoContainer"
          class="display-flex flex-center-x flex-center-y"
        ></div>
      </section>
    </main>
    <dialog id="fotoDialog">
      <header class="fotoDialog-header display-flex flex-center-y">
        <h2 id="fotoDialogHeadline"></h2>
        <button class="foto-dialog-close-btn" type="button" onclick="fotoDialog.close()"></button>
      </header>
      <figure class="foto-dialog-img-wrapper display-flex flex-center-x flex-center-y">
        <img id="fotoDialogImg" />
        <figcaption id="fotoDialogFileName"></figcaption>
      </figure>
      <footer class="display-flex foto-dialog-footer">
        <button
          id="browseImgBack"
          class="foto-dialog-browse-btn"
          onclick="browseImgBack()"
        ></button>
        <div id="imgCounter"></div>
        <button
          id="browseImgForward"
          class="foto-dialog-browse-btn"
          onclick="browseImgForward()"
        ></button>
      </footer>
    </dialog>
    <footer id="main-footer-on-page" class="display-flex">
      <figure class="logo display-flex">
        <img src="img/logo/logo-pikogram.svg" alt="Logo Fotogram" />
      </figure>
    </footer>
  </body>
</html>
