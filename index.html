<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Fotogram</title>

    <link rel="icon" href="img/logo/logo-pikogram.svg" type="image/svg+xml" />
    <link rel="icon" href="img/logo/logo-pikogram.png" sizes="32x32" />
    <link rel="icon" href="img/logo/logo-pikogram.ico" />

    <script src="script.js"></script>

    <link rel="stylesheet" href="style.css" />
    <link rel="stylesheet" href="style/flex-style.css" />
    <link rel="stylesheet" href="style/logo.css" />
    <link rel="stylesheet" href="style/fotogalerie.css" />
    <link rel="stylesheet" href="style/foto-dialog.css" />
    <link rel="stylesheet" href="style/tablet-view.css" />
  </head>
  <body onload="init()" class="display-flex flex-column">
    <header id="main-header-on-page" class="display-flex">
      <figure class="display-flex logo">
        <img src="img/logo/logo.png" alt="Logo Fotogram" />
      </figure>
    </header>
    <main class="display-flex">
      <section
        class="content display-flex flex-column flex-center-x flex-center-y"
      >
        <h1>Your personal photo album</h1>
        <div
          id="foto-container"
          class="display-flex flex-center-x flex-center-y"
        ></div>
      </section>
    </main>
    <dialog id="fotoDialog" onclick="fotoDialog.close()">
      <div id="foto-dialog-stopbubbeling-wrapper" onclick="stopClick(event)">
        <header class="fotoDialog-header display-flex flex-center-y">
          <h2 id="foto-dialog-headline"></h2>
          <button
            class="foto-dialog-close-btn"
            type="button"
            onclick="fotoDialog.close()" aria-label="Schließen"
          ></button>
        </header>
        <figure
          class="foto-dialog-img-wrapper display-flex flex-center-x flex-center-y"
        >
          <img id="foto-dialog-img" />
          <figcaption id="foto-dialog-filename"></figcaption>
        </figure>
        <footer class="display-flex foto-dialog-footer">
          <button
            id="browse-img-back"
            class="foto-dialog-browse-btn"
            onclick="browseImgBack()"
            aria-label="Vorheriges Bild anzeigen"
          ></button>
          <div id="img-counter"></div>
          <button
            id="browse-img-forward"
            class="foto-dialog-browse-btn"
            onclick="browseImgForward()"
            aria-label="Nächstes Bild anzeigen"
          ></button>
        </footer>
      </div>
    </dialog>
    <footer id="main-footer-on-page" class="display-flex">
      <figure class="logo display-flex">
        <img src="img/logo/logo-pikogram.png" alt="Logo Fotogram" />
      </figure>
    </footer>
  </body>
</html>
